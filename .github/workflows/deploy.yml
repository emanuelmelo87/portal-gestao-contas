name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite disparar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar HTML
        run: |
          python3 -c "
          import sys
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          checks = [
              ('Firebase SDK', 'firebase-app-compat.js' in content),
              ('Firestore SDK', 'firebase-firestore-compat.js' in content),
              ('Firebase config', 'jira-medias-contas' in content),
              ('DM Sans font', 'DM Sans' in content),
              ('Chart.js', 'chart.js' in content.lower()),
          ]
          ok = True
          for name, result in checks:
              status = '✅' if result else '❌'
              print(f'{status} {name}')
              if not result:
                  ok = False
          sys.exit(0 if ok else 1)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
